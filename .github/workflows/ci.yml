name: FishSpot CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Lint HTML
  # ─────────────────────────────────────────
  lint-html:
    name: Validar HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Rodar HTMLHint
        run: npm run lint:html

  # ─────────────────────────────────────────
  # JOB 2 — Lint CSS
  # ─────────────────────────────────────────
  lint-css:
    name: Validar CSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Rodar Stylelint
        run: npm run lint:css

  # ─────────────────────────────────────────
  # JOB 3 — Lint JS
  # ─────────────────────────────────────────
  lint-js:
    name: Validar JavaScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Rodar ESLint
        run: npm run lint:js

  # ─────────────────────────────────────────
  # JOB 4 — Testes unitários + cobertura
  # ─────────────────────────────────────────
  test:
    name: Testes Unitários
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Rodar Jest com cobertura
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 5 — Build (só roda se lint e testes passarem)
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-html, lint-css, lint-js, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar build (dist/)
        run: npm run build

      - name: Upload artifact de build
        uses: actions/upload-artifact@v4
        with:
          name: fishspot-dist
          path: dist/
          retention-days: 14

  # ─────────────────────────────────────────
  # JOB 6 — Status summary (badge de CI)
  # ─────────────────────────────────────────
  ci-summary:
    name: CI OK
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Verificar resultado do pipeline
        run: |
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ Pipeline concluído com sucesso!"
          else
            echo "❌ Pipeline falhou — verifique os jobs acima."
            exit 1
          fi
