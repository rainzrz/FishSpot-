<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FishSpot</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-brand">
      <span class="logo-icon">🎣</span>
      <span class="logo-text">FishSpot</span>
    </div>
    <nav class="header-nav">
      <button class="nav-btn active" data-view="map">Mapa</button>
      <button class="nav-btn" data-view="feed">Comunidade</button>
      <button class="nav-btn" data-view="profile">Perfil</button>
    </nav>
    <button class="btn-login" id="btnLogin">Entrar</button>
  </header>

  <!-- MAP VIEW -->
  <div id="view-map" class="view active">
    <div id="map"></div>

    <!-- Search bar over map -->
    <div class="map-search">
      <input type="text" id="searchInput" placeholder="Buscar ponto de pesca..." />
      <button id="btnLocate">📍 Minha localização</button>
    </div>

    <!-- Filter chips -->
    <div class="filter-bar">
      <button class="chip active" data-filter="all">Todos</button>
      <button class="chip" data-filter="lago">Lagos</button>
      <button class="chip" data-filter="rio">Rios</button>
      <button class="chip" data-filter="acude">Açudes</button>
      <button class="chip" data-filter="mar">Mar</button>
    </div>

    <!-- Spot card panel (hidden by default) -->
    <div id="spotPanel" class="spot-panel hidden">
      <button class="panel-close" id="panelClose">✕</button>
      <div id="spotContent"></div>
    </div>
  </div>

  <!-- FEED VIEW -->
  <div id="view-feed" class="view hidden">
    <div class="feed-header">
      <h2>Comunidade</h2>
      <button class="btn-primary" id="btnNewPost">+ Nova postagem</button>
    </div>
    <div class="feed-list" id="feedList"></div>
  </div>

  <!-- PROFILE VIEW -->
  <div id="view-profile" class="view hidden">
    <div class="profile-card">
      <div class="profile-avatar">🎣</div>
      <h2 id="profileName">Pescador Anônimo</h2>
      <p id="profileBio">Faça login para ver seu perfil</p>
      <div class="profile-stats">
        <div class="stat"><span class="stat-val">0</span><span class="stat-label">Pontos visitados</span></div>
        <div class="stat"><span class="stat-val">0</span><span class="stat-label">Confirmações</span></div>
        <div class="stat"><span class="stat-val">0</span><span class="stat-label">Fotos</span></div>
      </div>
    </div>
    <div class="profile-section">
      <h3>Seus posts recentes</h3>
      <div id="userPosts" class="user-posts-empty">Nenhum post ainda.</div>
    </div>
  </div>

  <!-- LOGIN MODAL -->
  <div id="loginModal" class="modal hidden">
    <div class="modal-box">
      <button class="modal-close" id="modalClose">✕</button>
      <h2>Entrar no FishSpot</h2>
      <input type="text" id="inputName" placeholder="Seu nome" />
      <input type="email" id="inputEmail" placeholder="E-mail" />
      <input type="password" id="inputPass" placeholder="Senha" />
      <button class="btn-primary full" id="btnConfirmLogin">Entrar</button>
      <p class="modal-note">Protótipo — sem autenticação real</p>
    </div>
  </div>

  <!-- NEW POST MODAL -->
  <div id="postModal" class="modal hidden">
    <div class="modal-box">
      <button class="modal-close" id="postModalClose">✕</button>
      <h2>Nova Postagem</h2>
      <select id="postSpot"></select>
      <textarea id="postText" placeholder="O que está acontecendo nesse ponto? Peixes dando? Condições do local..."></textarea>
      <label class="upload-label">
        📷 Adicionar foto (simulado)
        <input type="file" accept="image/*" id="postPhoto" style="display:none" />
      </label>
      <div class="confirm-row">
        <label><input type="checkbox" id="postConfirm" /> Confirmar que peixe está dando neste ponto</label>
      </div>
      <button class="btn-primary full" id="btnSubmitPost">Publicar</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
